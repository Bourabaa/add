services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: add-pfe-dashboard
    command: gunicorn --bind 0.0.0.0:5000 app:app
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: "0"
      PYTHONUNBUFFERED: "1"
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
